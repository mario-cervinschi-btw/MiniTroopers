<div class="header__title" [routerLink]="['/']">LinkedOut</div>
<div class="header__actions">Add your action dropdown here</div>
<div class="header__right">
  <mat-icon class="cursor_pointer" (click)="handleDarkMode()">
    @if (uiFacade.isDarkTheme$ | async) {
      light_mode
    } @else {
      dark_mode
    }
  </mat-icon>
  <button matIconButton [matMenuTriggerFor]="menu" aria-label="Menu button">
    <mat-icon>menu</mat-icon>
  </button>
  <mat-menu #menu="matMenu">
    <button mat-menu-item [routerLink]="['/settings']">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>
  </mat-menu>
</div>
