<h1>Network</h1>
<app-wrapper>
  @if (this.loadingUsers) {
    <mat-progress-bar mode="indeterminate"></mat-progress-bar>
  }
  <mat-form-field>
    <mat-label>Search</mat-label>
    <input
      matInput
      [(ngModel)]="searchValue"
      (keyup)="applyFilter($event)"
      placeholder="Search companies"
    />
  </mat-form-field>
  <table mat-table [dataSource]="usersAvailable" class="mat-elevation-z8">
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let user">
        <div class="name-cell">
          <app-avatar [firstName]="user.firstName" [lastName]="user.lastName"></app-avatar>
          {{ user.firstName + ' ' + user.lastName }}
        </div>
      </td>
    </ng-container>

    <!-- Headline Column -->
    <ng-container matColumnDef="headline">
      <th mat-header-cell *matHeaderCellDef>Headline</th>
      <td mat-cell *matCellDef="let user">
        <mat-icon tech-icons [headline]="user.headline"></mat-icon>{{ user.headline }}
      </td>
    </ng-container>

    <!-- Location Column -->
    <ng-container matColumnDef="location">
      <th mat-header-cell *matHeaderCellDef>Location</th>
      <td mat-cell *matCellDef="let user">{{ user.location }}</td>
    </ng-container>

    <!-- Connections Column -->
    <ng-container matColumnDef="connections">
      <th mat-header-cell *matHeaderCellDef>Connections</th>
      <td mat-cell *matCellDef="let user">{{ user.connections }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr
      mat-row
      [highlight]="row.headline"
      *matRowDef="let row; columns: displayedColumns"
      (click)="onRowClick(row)"
    ></tr>
  </table>
  <mat-paginator
    [length]="totalUsers"
    [pageSize]="itemsPerPage"
    [pageIndex]="pageIndex"
    [pageSizeOptions]="[10, 50, 100]"
    (page)="handlePageEvent($event)"
    aria-label="Select page"
  >
  </mat-paginator>
</app-wrapper>
